{% extends 'base.html' %}

{% block title %}Форма выставки{% endblock %}

{% block content %}
<div class="panel">
    <h1>{% if form.instance.pk %}Редактирование выставки{% else %}Добавление выставки{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Сохранить</button>
    </form>
</div>
{% endblock %}
