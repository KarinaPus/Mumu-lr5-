{% extends 'base.html' %}

{% block title %}Новый отзыв{% endblock %}

{% block content %}
<div class="panel">
    <h1>Оставить отзыв</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Отправить</button>
    </form>
</div>
{% endblock %}
