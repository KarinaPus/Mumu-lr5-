{% extends 'base.html' %}

{% block title %}Удаление выставки{% endblock %}

{% block content %}
<div class="panel">
    <h1>Удалить выставку</h1>
    <p>Вы уверены, что хотите удалить выставку «{{ exhibition.title }}»?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Удалить</button>
        <a class="btn btn-secondary" href="{% url 'museum:exhibition-detail' exhibition.pk %}">Отмена</a>
    </form>
</div>
{% endblock %}
